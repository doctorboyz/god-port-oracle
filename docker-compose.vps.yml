# MT5 Bridge Containers on x86_64 VPS
# Uses gmag11/MetaTrader5-Docker as base, extended with our custom RPyC bridge
#
# gmag11 provides: Wine + MT5 terminal + Python 3.9 + VNC
# We add: custom RPyC bridge server (mt5_bridge_server.py) + numpy fix
#
# Container names are short: mt5a, mt5b, mt5c, mt5d
# Bridge port 8001 inside container → mapped to 5005/5006/5007/5008 externally
# VNC port 3000 inside container → mapped to 5900/5901/5902/5903 externally
#
# First-time setup:
#   1. docker compose -f docker-compose.vps.yml up -d
#   2. Wait ~3 min for gmag11 initialization
#   3. Login to MT5 via VNC for each account (first time only)
#   4. Bridge auto-starts after container restart
#
# DO NOT use on macOS ARM — Wine crashes under Rosetta emulation

services:
  mt5a:
    build:
      context: ./docker/mt5
      dockerfile: Dockerfile
    container_name: mt5a
    environment:
      - MT5_CMD_OPTIONS=/login:${MT5_LOGIN_A} /server:${MT5_SERVER_A:-Exness-MT5Trial17}
      - CUSTOM_USER=mt5user
      - PASSWORD=mt5password
    ports:
      - "5900:3000"  # VNC web interface
      - "5005:8001"  # RPyC bridge
    volumes:
      - mt5-config-a:/config
    restart: unless-stopped

  mt5b:
    build:
      context: ./docker/mt5
      dockerfile: Dockerfile
    container_name: mt5b
    environment:
      - MT5_CMD_OPTIONS=/login:${MT5_LOGIN_B} /server:${MT5_SERVER_B:-Exness-MT5Trial17}
      - CUSTOM_USER=mt5user
      - PASSWORD=mt5password
    ports:
      - "5901:3000"  # VNC web interface
      - "5006:8001"  # RPyC bridge
    volumes:
      - mt5-config-b:/config
    restart: unless-stopped

  mt5c:
    build:
      context: ./docker/mt5
      dockerfile: Dockerfile
    container_name: mt5c
    environment:
      - MT5_CMD_OPTIONS=/login:${MT5_LOGIN_C} /server:${MT5_SERVER_C:-Exness-MT5Trial7}
      - CUSTOM_USER=mt5user
      - PASSWORD=mt5password
    ports:
      - "5902:3000"  # VNC web interface
      - "5007:8001"  # RPyC bridge
    volumes:
      - mt5-config-c:/config
    restart: unless-stopped

  # ═══ Account D: V6-Demo2 — Demo Pro $500 ════════════════════════════════
  # To activate: set MT5_LOGIN_D, MT5_PASSWORD_D, MT5_SERVER_D in .env
  # and change ACCOUNTS to A,B,C,D
  mt5d:
    build:
      context: ./docker/mt5
      dockerfile: Dockerfile
    container_name: mt5d
    environment:
      - MT5_CMD_OPTIONS=/login:${MT5_LOGIN_D:-} /server:${MT5_SERVER_D:-Exness-MT5Trial7}
      - CUSTOM_USER=mt5user
      - PASSWORD=mt5password
    ports:
      - "5903:3000"  # VNC web interface
      - "5008:8001"  # RPyC bridge
    volumes:
      - mt5-config-d:/config
    restart: unless-stopped

  oracle-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oracle-engine
    environment:
      - TRADING_PHASE=${TRADING_PHASE:-both}
      - DRY_RUN=${DRY_RUN:-1}
      - ACCOUNTS=${ACCOUNTS:-A,B,C}
      - DB_PATH=/app/data/oracle.db
      - COLLECT_INTERVAL=${COLLECT_INTERVAL:-300}
      - TRADE_INTERVAL=${TRADE_INTERVAL:-300}
      - SCALP_ENABLED=${SCALP_ENABLED:-0}
      - SCALP_INTERVAL=${SCALP_INTERVAL:-60}
      - SCALP_SPREAD_MAX=${SCALP_SPREAD_MAX:-30}
      - SCALP_RISK_PER_TRADE=${SCALP_RISK_PER_TRADE:-0.01}
      - M5_SCALP_ENABLED=${M5_SCALP_ENABLED:-1}
      - M5_SCALP_INTERVAL=${M5_SCALP_INTERVAL:-300}
      - M5_SCALP_SPREAD_MAX=${M5_SCALP_SPREAD_MAX:-30}
      - M5_SCALP_RISK_PER_TRADE=${M5_SCALP_RISK_PER_TRADE:-0.015}
      - ML_FILTER_ENABLED=${ML_FILTER_ENABLED:-1}
      - ML_LOSS_THRESHOLD=${ML_LOSS_THRESHOLD:-0.65}
      - ML_MODEL_DIR=${ML_MODEL_DIR:-/app/data/models/trade_outcome_v6}
      - SWING_DISABLED_ACCOUNTS=${SWING_DISABLED_ACCOUNTS:-}
      - MAX_POSITIONS_PER_ACCOUNT=${MAX_POSITIONS_PER_ACCOUNT:-5}
      - MAX_POSITIONS_A=${MAX_POSITIONS_A:-5}
      - MAX_POSITIONS_B=${MAX_POSITIONS_B:-5}
      - MAX_POSITIONS_C=${MAX_POSITIONS_C:-5}
      - LEARNING_MODE=${LEARNING_MODE:-0}
      - ATR_MULTIPLIER_A=${ATR_MULTIPLIER_A:-2.0}
      - ATR_MULTIPLIER_B=${ATR_MULTIPLIER_B:-2.0}
      - ATR_MULTIPLIER_C=${ATR_MULTIPLIER_C:-2.0}
      - RR_RATIO_A=${RR_RATIO_A:-2.5}
      - RR_RATIO_B=${RR_RATIO_B:-2.5}
      - RR_RATIO_C=${RR_RATIO_C:-2.5}
      - MIN_CONFIDENCE_A=${MIN_CONFIDENCE_A:-0.45}
      - MIN_CONFIDENCE_B=${MIN_CONFIDENCE_B:-0.45}
      - MIN_CONFIDENCE_C=${MIN_CONFIDENCE_C:-0.45}
      # Per-account max spread (Account A = XAUUSDm Standard, needs wider spread)
      - M5_MAX_SPREAD_A=${M5_MAX_SPREAD_A:-45}
      - M5_MAX_SPREAD_B=${M5_MAX_SPREAD_B:-30}
      - M5_MAX_SPREAD_C=${M5_MAX_SPREAD_C:-30}
      - SCALP_MAX_SPREAD_A=${SCALP_MAX_SPREAD_A:-50}
      - SCALP_MAX_SPREAD_B=${SCALP_MAX_SPREAD_B:-35}
      - SCALP_MAX_SPREAD_C=${SCALP_MAX_SPREAD_C:-35}
      # Partial TP (Option C): close at TP1, open scale-in position
      - PARTIAL_TP_ENABLED_A=${PARTIAL_TP_ENABLED_A:-0}
      - PARTIAL_TP_ENABLED_B=${PARTIAL_TP_ENABLED_B:-0}
      - PARTIAL_TP_ENABLED_C=${PARTIAL_TP_ENABLED_C:-1}
      - TP1_RATIO_A=${TP1_RATIO_A:-0.5}
      - TP1_RATIO_B=${TP1_RATIO_B:-0.5}
      - TP1_RATIO_C=${TP1_RATIO_C:-0.5}
      - RR_SCALE_IN_A=${RR_SCALE_IN_A:-2.5}
      - RR_SCALE_IN_B=${RR_SCALE_IN_B:-2.5}
      - RR_SCALE_IN_C=${RR_SCALE_IN_C:-2.5}
      # ═══ Account D config (V6-Demo2) ═══════════════════════════════════
      - MAX_POSITIONS_D=${MAX_POSITIONS_D:-5}
      - ATR_MULTIPLIER_D=${ATR_MULTIPLIER_D:-2.5}
      - RR_RATIO_D=${RR_RATIO_D:-2.5}
      - MIN_CONFIDENCE_D=${MIN_CONFIDENCE_D:-0.45}
      - BUY_MIN_CONFIDENCE_D=${BUY_MIN_CONFIDENCE_D:-0.45}
      - M5_MAX_SPREAD_D=${M5_MAX_SPREAD_D:-30}
      - SCALP_MAX_SPREAD_D=${SCALP_MAX_SPREAD_D:-35}
      - PARTIAL_TP_ENABLED_D=${PARTIAL_TP_ENABLED_D:-0}
      - TP1_RATIO_D=${TP1_RATIO_D:-0.5}
      - RR_SCALE_IN_D=${RR_SCALE_IN_D:-2.5}
      - INITIAL_BALANCE_D=${INITIAL_BALANCE_D:-500}
      - INITIAL_EQUITY_D=${INITIAL_EQUITY_D:-500}
      - LEVERAGE_D=${LEVERAGE_D:-500}
      - DRAWDOWN_DAILY_LIMIT_D=${DRAWDOWN_DAILY_LIMIT_D:-0.10}
      - DRAWDOWN_WEEKLY_LIMIT_D=${DRAWDOWN_WEEKLY_LIMIT_D:-0.20}
      - DRAWDOWN_ACCOUNT_LIMIT_D=${DRAWDOWN_ACCOUNT_LIMIT_D:-0.50}
      - DRAWDOWN_COOLDOWN_HOURS_D=${DRAWDOWN_COOLDOWN_HOURS_D:-2}
      # ═══ Account types (real vs demo) ═══════════════════════════════════
      - ACCOUNT_TYPE_A=${ACCOUNT_TYPE_A:-real}
      - ACCOUNT_TYPE_B=${ACCOUNT_TYPE_B:-demo}
      - ACCOUNT_TYPE_C=${ACCOUNT_TYPE_C:-demo}
      - ACCOUNT_TYPE_D=${ACCOUNT_TYPE_D:-demo}
      # ═══ MT5 Bridge credentials ══════════════════════════════════════════
      - MT5_LOGIN_A=${MT5_LOGIN_A:-}
      - MT5_PASSWORD_A=${MT5_PASSWORD_A:-}
      - MT5_SERVER_A=${MT5_SERVER_A:-Exness-MT5Trial17}
      - MT5_BRIDGE_A_HOST=mt5a
      - MT5_BRIDGE_A_PORT=8001
      - MT5_LOGIN_B=${MT5_LOGIN_B:-}
      - MT5_PASSWORD_B=${MT5_PASSWORD_B:-}
      - MT5_SERVER_B=${MT5_SERVER_B:-Exness-MT5Trial17}
      - MT5_BRIDGE_B_HOST=mt5b
      - MT5_BRIDGE_B_PORT=8001
      - MT5_LOGIN_C=${MT5_LOGIN_C:-}
      - MT5_PASSWORD_C=${MT5_PASSWORD_C:-}
      - MT5_SERVER_C=${MT5_SERVER_C:-Exness-MT5Trial7}
      - MT5_BRIDGE_C_HOST=mt5c
      - MT5_BRIDGE_C_PORT=8001
      - MT5_LOGIN_D=${MT5_LOGIN_D:-}
      - MT5_PASSWORD_D=${MT5_PASSWORD_D:-}
      - MT5_SERVER_D=${MT5_SERVER_D:-Exness-MT5Trial7}
      - MT5_BRIDGE_D_HOST=mt5d
      - MT5_BRIDGE_D_PORT=8001
      - MT5_SYMBOL_D=${MT5_SYMBOL_D:-XAUUSD}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
      - TG_CHAT_ID=${TG_CHAT_ID:-}
    volumes:
      - oracle-data:/app/data
    depends_on:
      mt5a:
        condition: service_healthy
      mt5b:
        condition: service_healthy
      mt5c:
        condition: service_healthy
      mt5d:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mt5-config-a:
    driver: local
  mt5-config-b:
    driver: local
  mt5-config-c:
    driver: local
  mt5-config-d:
    driver: local
  oracle-data:
    driver: local